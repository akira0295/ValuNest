{% extends "base.html" %}
{% block title %}Predict Price{% endblock %}
{% block content %}
<div class="container" style="margin-top:40px;">
  <div class="breadcrumb">{{ city }} › {{ location }} › <span>Predict price</span></div>
  <h1>Property details</h1>
  <p class="subtitle">Fill in the details to get your price estimate</p>

  {% if error %}
  <div style="background:#fff8e1;border:2px solid #ffe082;color:#795548;border-radius:14px;padding:16px 20px;margin-bottom:20px;font-size:15px;">
    ⚠️ {{ error }}
  </div>
  {% endif %}

  <form method="post">
    <div class="form-row">
      <div class="form-group">
        <label>Area (sqft)</label>
        <input type="number" name="area" placeholder="e.g. 1200" min="100" required>
      </div>
      <div class="form-group">
        <label>Bedrooms</label>
        <input type="number" name="bedrooms" placeholder="e.g. 3" min="1" max="9" required>
      </div>
    </div>
    <div class="form-row">
      <div class="form-group">
        <label>Bathrooms</label>
        <input type="number" name="bathrooms" placeholder="e.g. 2" min="1" max="9" required>
      </div>
      <div class="form-group">
        <label>Property type</label>
        <select name="resale">
          <option value="0">New</option>
          <option value="1">Resale</option>
        </select>
      </div>
    </div>
    <div class="form-row">
      <div class="form-group">
        <label>Car parking</label>
        <select name="parking">
          <option value="1">Available</option>
          <option value="0">Not available</option>
        </select>
      </div>
      <div class="form-group">
        <label>Lift</label>
        <select name="lift">
          <option value="1">Available</option>
          <option value="0">Not available</option>
        </select>
      </div>
    </div>
    <div class="amenities-section">
      <p class="amenities-title">Amenities</p>
      <div class="checkbox-grid">
        <label class="checkbox-label"><input type="checkbox" name="gym" value="1"> Gymnasium</label>
        <label class="checkbox-label"><input type="checkbox" name="pool" value="1"> Swimming pool</label>
        <label class="checkbox-label"><input type="checkbox" name="security" value="1"> 24x7 Security</label>
        <label class="checkbox-label"><input type="checkbox" name="power" value="1"> Power backup</label>
        <label class="checkbox-label"><input type="checkbox" name="club" value="1"> Club house</label>
      </div>
    </div>
    <div style="display:flex;gap:12px;">
      <a href="{{ url_for('choose_option') }}" class="btn btn-secondary" style="flex:1;text-align:center;">← Back</a>
      <button type="submit" class="btn" style="flex:2;">Get price estimate →</button>
    </div>
  </form>
</div>
{% endblock %}
