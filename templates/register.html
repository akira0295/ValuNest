{% extends "base.html" %}
{% block title %}Register{% endblock %}
{% block content %}
<div class="container narrow" style="margin-top:60px;">
  <div style="text-align:center;margin-bottom:24px;">
    <div style="font-size:40px;margin-bottom:8px;">🏠</div>
    <h1>Create account</h1>
    <p class="subtitle">Start predicting house prices today</p>
  </div>
  <form method="post">
    <div class="form-group">
      <label>Full name</label>
      <input type="text" name="name" placeholder="Your name" required>
    </div>
    <div class="form-group">
      <label>Email address</label>
      <input type="email" name="email" placeholder="you@email.com" required>
    </div>
    <div class="form-group">
      <label>Password</label>
      <input type="password" name="password" placeholder="Create a password" required>
    </div>
    <div class="form-group">
      <label>Confirm password</label>
      <input type="password" name="confirm" placeholder="Repeat password" required>
    </div>
    <button type="submit" class="btn btn-full" style="margin-top:8px;">Create account →</button>
  </form>
  <div class="auth-footer">
    Already have an account? <a href="{{ url_for('login') }}" class="link">Sign in</a>
  </div>
  <div style="text-align:center;margin-top:16px;">
    <a href="{{ url_for('login') }}" class="btn btn-secondary" style="padding:10px 28px;">← Back to login</a>
  </div>
</div>
{% endblock %}
